<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    form {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 100%;
    }
    button {
      padding: 10px;
      background: #0070f3;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<form>
  <h2>Registro</h2>
  <input type="text" placeholder="Nombre" required>
  <input type="email" placeholder="Correo" required>
  <input type="password" placeholder="Contraseña" required>
  <button type="submit">Registrarse</button>
</form>

</body>
</html>
